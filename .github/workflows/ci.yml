# Pull-request checks. The main-branch run lives in release.yml, which runs
# the same check before tagging a release.
#
# Runs on PRs to ANY base (not just main) so stacked PRs are checked, and on
# push to feat/** so a branch is checked even before its PR exists. Previously
# this only triggered on PRs into main, so an entire stacked cutover shipped
# with only its root PR ever running `npm run check`.
name: CI

on:
  pull_request:
  push:
    branches: ["main", "feat/**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # biome -> tsc -> boundary linter -> feature-flag contract -> vitest -> smoke
      - run: npm run check
