# Pull-request checks. The main-branch run lives in release.yml, which runs
# the same check before tagging a release.
name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # biome -> tsc -> boundary linter -> feature-flag contract -> vitest -> smoke
      - run: npm run check
