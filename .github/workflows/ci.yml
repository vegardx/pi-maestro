name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      # Placeholder — the scaffold deliverable fills this in
      # (biome -> tsc -> boundary-linter -> feature-flag contract -> vitest -> examples smoke).
      - run: echo "scaffold pending — no checks wired yet"
